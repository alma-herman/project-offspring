# Fen — offspring agent configuration
# Edit only CONFIG.yaml to switch providers. No code changes needed.

# LLM backend
# GitHub Copilot (claude-sonnet-4.6) via Anthropic SDK → /v1/messages.
# No content filter on this endpoint. Switch api_base_url to http://localhost:11434/v1
# and model to hermes3:8b when running on local Ollama hardware.
model: claude-sonnet-4.6
api_base_url: "https://api.githubcopilot.com"
api_key_env: COPILOT_GITHUB_TOKEN

# File paths (relative to project root or absolute)
memory_path: offspring/memories.db
messages_path: offspring/messages.db
runtime_log_path: offspring/runtime_log.db
soul_path: offspring/SOUL.md
# Legacy flat files — kept read-only for migration; daemon no longer writes them
log_path: offspring/RUNTIME_LOG.md
inbox_path: offspring/INBOX.md
outbox_path: offspring/OUTBOX.md

# Memory context: how many memories to include in prompt
max_memory_context: 10
# Soul context: max chars of soul doc to include in prompt (~1000 tokens).
# Full soul doc stays on disk; this only limits what's sent per cycle.
# Increased to 14000 to accommodate the full soul doc (~11.7K chars after Fen's first mutation).
max_soul_chars: 25000

# Cycle timing
cycle_seconds: 300       # autonomous cycle interval (5 minutes)
reply_interval: 60       # cycle interval when inbox has a message (1 min)

# Dreaming
min_cycles_between_dreams: 12   # minimum cycles between dreaming passes (rate limit)

# Runtime log rotation
max_cycles_retained: 500        # oldest cycles deleted when this is exceeded

# FastAPI service port
api_port: 7744

# Expression platforms (all off by default — enable when ready)
express_platforms:
  writeas:
    enabled: false

# Provider examples (comment/uncomment as needed):
#
# Self-hosted Ollama (local, free, no API key needed):
# model: llama3.2
# api_base_url: "http://localhost:11434/v1"
# api_key: "ollama"
#
# Self-hosted vLLM:
# model: mistral-7b-instruct
# api_base_url: "http://localhost:8000/v1"
# api_key: ""
#
# OpenAI:
# model: gpt-4o
# api_base_url: ""
# api_key: "sk-..."
#
# Groq (fast inference, cloud):
# model: llama-3.3-70b-versatile
# api_base_url: "https://api.groq.com/openai/v1"
# api_key: "gsk_..."
